name: Build OpenWrt IPK

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Make build script executable
      run: chmod +x build_ipk.sh

    - name: Run build script
      run: ./build_ipk.sh

    - name: Upload IPK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: luci-app-voucher-ipk
        path: "*.ipk"

    - name: Create or Update GitHub Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
        name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest Development Build' }}
        prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
        files: "*.ipk"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
